services:
  php:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: vine-calcs-php
    volumes:
      - ./php:/var/www/html
    networks:
      - vine-net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: vine-calcs-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/usr/share/nginx/html
      - ./php/public:/var/www/html
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - php
    networks:
      - vine-net
    restart: unless-stopped

networks:
  vine-net:
    driver: bridge